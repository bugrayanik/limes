<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIMES — v3 Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Alegreya:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#181410; --stone:#1d1813; --stone-2:#262019; --parch:#f0e6cf; --parch-2:#e6d9bb;
  --gold:#c9a227; --gold-soft:#dbc06a; --rule:#8a7340; --tile:#2a2218; --tile-2:#241d15;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--stone);
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%, #2e2317 0%, transparent 60%);
  color:var(--parch); font-family:'Alegreya',Georgia,serif; min-height:100vh;
  display:flex; flex-direction:column; align-items:center; padding:1.2rem 1rem 3rem;
}
#app{width:min(94vw,640px); display:flex; flex-direction:column; align-items:stretch; gap:.5rem}
h1{font-family:'Cinzel',serif; font-weight:900; color:var(--gold); letter-spacing:.14em; text-align:center; font-size:clamp(38px,8vw,64px)}
.sub{color:#b5a888; font-style:italic; text-align:center; font-size:15px}
button{font-family:inherit; cursor:pointer}
select,input{font-family:inherit; background:var(--stone-2); color:var(--parch); border:1px solid var(--rule);
  padding:6px 9px; border-radius:3px; font-size:14px}

/* ── Setup ── */
.setup{display:flex; flex-direction:column; gap:.8rem; align-items:center; margin-top:1.2rem}
.setup .sub{max-width:46ch; margin-bottom:.4rem}
.srow{display:flex; align-items:center; gap:.6rem; width:100%; max-width:460px}
.srow[hidden]{display:none}
.slabel{font-family:'Cinzel',serif; font-size:12px; letter-spacing:.12em; color:var(--gold-soft); width:90px; text-transform:uppercase}
.srow select,.srow input{flex:1}
.seg{display:flex; flex:1; border:1px solid var(--rule); border-radius:4px; overflow:hidden}
.segbtn{flex:1; background:var(--stone-2); color:var(--parch-2); border:none; padding:8px; font-size:14px}
.segbtn.on{background:var(--gold); color:#1a1408; font-weight:700}
.hint{color:#8a7f66; font-size:12.5px; max-width:48ch; text-align:center; line-height:1.6; margin-top:.4rem}

/* ── Phase banner / panels / log ── */
.phase-banner{font-family:'Cinzel',serif; letter-spacing:.14em; color:var(--gold); text-align:center;
  font-size:15px; border-bottom:1px solid var(--rule); padding-bottom:6px; text-transform:uppercase}
.panel{background:var(--stone-2); border:1px solid #3a3226; border-radius:4px; padding:9px 11px; font-size:13.5px}
.budget{color:var(--gold-soft); font-size:13px; margin-bottom:7px; border-bottom:1px dotted #4a4030; padding-bottom:6px}
.prow{display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin:5px 0}
.plabel{font-family:'Cinzel',serif; font-size:11px; letter-spacing:.1em; color:#a08d62; text-transform:uppercase; min-width:64px}
.prow.staged{color:#cdbf9d; font-size:12.5px}
.pbtn{background:var(--stone); color:var(--parch); border:1px solid var(--rule); border-radius:3px; padding:5px 9px; font-size:12.5px}
.pbtn i{font-style:normal; color:var(--gold-soft); font-size:11px}
.pbtn:hover{border-color:var(--gold)}
.pbtn.on{background:var(--gold); color:#1a1408; font-weight:700; border-color:var(--gold)}
.pbtn.confirm{background:#3e5a2e; border-color:#6f9f4a; color:#eaf3da}
.pbtn.confirm:hover{background:#4a6c36}
.pbtn.undo{opacity:.8}
.pbtn.big{font-size:15px; padding:10px 20px; margin-top:.5rem}
.gamelog{font-size:12px; color:#8a7f66; font-style:italic; min-height:1.2em; text-align:center}

/* ── HUD ── */
.hud{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:.6rem; margin:.2rem 0 .5rem}
.hud .round{grid-column:2; font-family:'Cinzel',serif; color:var(--gold); letter-spacing:.18em; font-size:13px;
  border:1px solid var(--rule); padding:5px 12px; border-radius:3px; white-space:nowrap}
.side{border:1px solid #3a3226; border-top:3px solid var(--c); background:var(--stone-2); padding:7px 10px; border-radius:3px}
.side.owner1{grid-column:1; grid-row:1} .side.owner0{grid-column:3; grid-row:1}
.stitle{font-family:'Cinzel',serif; font-size:13px; letter-spacing:.06em; color:var(--c); font-weight:700}
.stitle .komi{color:var(--gold)}
.stats{display:flex; flex-wrap:wrap; gap:.1rem .6rem; font-size:12.5px; color:#cdbf9d; margin-top:3px}

/* ── 3D board ── */
.board3d-wrap{width:min(94vw,640px); height:520px; margin:.3rem auto; display:block;
  border:3px solid var(--rule); border-radius:6px; overflow:hidden;
  box-shadow:0 24px 50px -20px #000, inset 0 0 0 1px #00000060; background:#1d1813}
.board3d-wrap canvas{display:block}

/* ── Board (2D fallback) ── */
.board-grid{display:grid; grid-template-columns:repeat(8,1fr); gap:2px; background:#3a3226;
  border:3px solid var(--rule); border-radius:4px; padding:2px; box-shadow:0 24px 50px -20px #000, inset 0 0 0 1px #00000060}
.cell{position:relative; aspect-ratio:1; background:var(--tile); display:flex; align-items:center; justify-content:center;
  background-image:repeating-linear-gradient(0deg,#0000 0 6px,#ffffff05 6px 7px); cursor:default; transition:box-shadow .1s}
.cell.terr1{background:var(--tile-2)}
.cell.stakeline{border-top:3px solid var(--gold-soft)}
.cell.has-pal.stakeline{border-top-style:double; border-top-width:5px}
.pal{position:absolute; top:-4px; left:6%; width:88%; height:5px; background:var(--c); border-radius:2px; z-index:3}
/* interaction highlights */
.cell.hl-valid{cursor:pointer; box-shadow:inset 0 0 0 2px #c9a22755}
.cell.hl-move{cursor:pointer; box-shadow:inset 0 0 0 2px #6f9f4a; background-image:radial-gradient(circle,#6f9f4a33,transparent 70%)}
.cell.hl-melee{cursor:pointer; box-shadow:inset 0 0 0 3px #c0504a}
.cell.hl-shoot{cursor:pointer; box-shadow:inset 0 0 0 3px #d98f3a}
.cell.hl-charge{cursor:pointer; box-shadow:inset 0 0 0 3px #9a6cc0}
.cell.hl-stage{box-shadow:inset 0 0 0 2px var(--gold)}
.cell.sel{box-shadow:inset 0 0 0 3px var(--gold), 0 0 10px #c9a22788}
.cell[data-uid]{cursor:pointer}

/* ── Units ── */
.unit{position:relative; width:100%; height:100%; border:2px solid var(--c); border-radius:3px; overflow:hidden;
  display:flex; flex-direction:column; justify-content:flex-end; background:#0d0b08}
.billboard{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:top center}
.billboard.noimg{display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; color:var(--parch-2); font-size:20px; background:var(--stone-2)}
.hpbar{position:relative; height:4px; background:#000a; z-index:2}
.hpbar i{display:block; height:100%; background:linear-gradient(90deg,#3e7a3a,#7fbf4a)}
.ulabel{position:relative; z-index:2; font-family:'Cinzel',serif; font-size:8px; letter-spacing:.02em; text-transform:uppercase;
  color:var(--parch); background:#000000c0; padding:2px 3px; display:flex; justify-content:space-between; gap:3px}
.ulabel .hp{color:var(--gold-soft)}
.tier{position:absolute; top:2px; left:3px; z-index:3; color:var(--gold); font-size:10px; text-shadow:0 1px 2px #000}
.flags{position:absolute; top:1px; right:2px; z-index:3; display:flex; gap:1px}
.flag{font-size:10px; line-height:1; text-shadow:0 1px 2px #000}
.flag.ex{color:#c0504a} .flag.br{color:#9fa8b5} .flag.fd{color:var(--gold-soft)}
.orderbadge{position:absolute; bottom:1px; right:2px; z-index:4; background:var(--gold); color:#1a1408;
  font-family:'Cinzel',serif; font-size:9px; font-weight:700; width:13px; height:13px; border-radius:50%;
  display:flex; align-items:center; justify-content:center}

/* ── Wagons & fields ── */
.wagon{width:100%; height:100%; border:2px dashed var(--c); border-radius:3px; background:#171209;
  display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--parch-2)}
.wgicon{font-size:clamp(14px,4vw,22px); color:var(--c)}
.wghp{font-family:'Cinzel',serif; font-size:9px; color:var(--gold-soft)}
.field{font-size:clamp(13px,3.4vw,20px); opacity:.85}
.field.annexed{filter:drop-shadow(0 0 3px var(--gold))}
.field.f-owner0{box-shadow:inset 0 -3px 0 #a3263855} .field.f-owner1{box-shadow:inset 0 -3px 0 #2b4f8155}

/* ── Win screen ── */
.winscreen{text-align:center; margin-top:1rem; background:var(--stone-2); border:1px solid var(--gold);
  border-radius:6px; padding:1.4rem}
.winscreen h2{font-family:'Cinzel',serif; color:var(--gold); font-size:34px; letter-spacing:.08em}
.winscreen p{color:var(--parch-2); margin:.5rem 0 1rem}

/* ── topbar (phase + guide button) ── */
.topbar{display:flex; align-items:center; justify-content:space-between; gap:.5rem; margin-bottom:.3rem}
.topbar .phase-banner{flex:1; border-bottom:none; padding-bottom:0; text-align:left}
.guide-btn{flex:none}
.phase-hint{font-size:12.5px; line-height:1.5; color:#b3a888; background:#0000003d; border-left:2px solid var(--rule);
  padding:5px 9px; border-radius:0 3px 3px 0; margin-bottom:.2rem}
.phase-hint b{color:var(--gold-soft)}
.phase-hint:empty{display:none}

/* ── round track (TFT-style) + phase stepper ── */
.phasebar{margin:.1rem 0 .4rem; display:flex; flex-direction:column; gap:5px}
.rtrack{display:flex; align-items:center; flex-wrap:wrap; gap:3px; font-size:11px}
.rlbl{font-family:'Cinzel',serif; color:var(--gold); letter-spacing:.1em; margin-right:4px; white-space:nowrap}
.rdot{display:inline-flex; align-items:center; justify-content:center; min-width:17px; height:17px; padding:0 2px;
  border-radius:4px; background:#ffffff10; color:#7d765f; font-size:10px; border:1px solid transparent}
.rdot.past{color:#5f5a49; background:#ffffff08}
.rdot.future{color:#8a8268}
.rdot.cur{background:var(--gold); color:#1a1408; font-weight:700; box-shadow:0 0 9px #d9b84a99; transform:scale(1.18); border-color:#ffffff66}
.rdot.cara{color:#e0b6ff; background:#7a4ea024; border-color:#7a4ea0aa}
.rdot.gold{color:#ffd86a; border-color:#c9a22788}
.rdot.stop{color:#e98a7a; border-color:#c0504a88}
.rdot.cur.cara,.rdot.cur.gold,.rdot.cur.stop{color:#1a1408}
.rnote{margin-left:5px; color:#e0b6ff; font-size:10.5px; font-style:italic}
.psteps{display:flex; align-items:center; flex-wrap:wrap; gap:2px; font-size:11px}
.pchip{display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:7px; background:#ffffff0d; color:#8a8270; white-space:nowrap}
.pchip b{font-style:normal}
.pchip.active{background:var(--gold); color:#221a0c; font-weight:700; box-shadow:0 0 10px #d9b84a88; transform:scale(1.05)}
.pchip.done{color:#6b6452; opacity:.75}
.pchip.soon{opacity:.5}
.pchip.auto{font-style:italic}
.pchip i{font-style:normal; background:#0003; padding:0 4px; border-radius:3px; font-size:10px; margin-left:1px}
.parr{color:#5a5446}

/* ── resource HUD (3D view) ── */
.reshud{display:flex; align-items:stretch; gap:6px; margin:.1rem 0 .35rem; font-size:12px}
.reshud:empty{display:none}
.hud-side{flex:1; display:flex; flex-wrap:wrap; align-items:center; gap:.15rem .5rem; background:var(--stone-2);
  border:1px solid #3a3226; border-top:3px solid var(--c); border-radius:4px; padding:5px 9px}
.hud-side.me{box-shadow:inset 0 0 0 1px var(--gold)}
.hud-who{font-family:'Cinzel',serif; font-size:12px; letter-spacing:.06em; color:var(--c); font-weight:700; margin-right:.2rem}
.hud-stat{color:#cdbf9d; white-space:nowrap}
.hud-stat.low{color:#ff6a5a; font-weight:700; animation:hudpulse 1s ease-in-out infinite}
@keyframes hudpulse{0%,100%{opacity:1}50%{opacity:.45}}
.hud-vs{align-self:center; color:#7a715a; font-family:'Cinzel',serif; font-size:11px}
.reshud{flex-direction:column}
.hud-row{display:flex; align-items:stretch; gap:6px}

/* persistent artifacts strip */
.artbar{display:flex; flex-wrap:wrap; align-items:center; gap:.3rem .55rem; margin-top:5px; padding:5px 9px;
  background:#1a1206; border:1px solid #5a4326; border-radius:4px; font-size:11.5px}
.art-lbl{font-family:'Cinzel',serif; color:var(--gold); letter-spacing:.08em}
.art-side{display:inline-flex; flex-wrap:wrap; align-items:center; gap:.25rem}
.art-side>b{color:var(--c); font-family:'Cinzel',serif; font-size:11px; margin-right:.1rem}
.art-chip{background:#2a1f10; border:1px solid #4a3a1e; border-radius:10px; padding:1px 8px; color:#e8d9b0; white-space:nowrap}
.art-chip i{font-style:normal; color:#9a8a64; margin-left:.25rem}

/* phase hint — fixed height so the board doesn't jump as the text changes */
.phase-hint{min-height:3.4em}

/* caravan artifact card (the draft moment) */
.caravan-ov{position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center;
  background:#0a0805cc; pointer-events:none}
.cv-card{background:var(--stone-2); border:2px solid var(--gold); border-radius:10px; padding:16px 20px;
  box-shadow:0 24px 60px -10px #000, 0 0 40px #c9a22744; max-width:92vw; animation:cvpop .35s ease}
@keyframes cvpop{from{transform:scale(.85); opacity:0}to{transform:scale(1); opacity:1}}
.cv-title{font-family:'Cinzel',serif; color:var(--gold); font-size:18px; letter-spacing:.1em; text-align:center; margin-bottom:12px}
.cv-sides{display:flex; gap:14px; justify-content:center; flex-wrap:wrap}
.cv-side{border-top:3px solid var(--c); background:var(--stone); border-radius:6px; padding:8px 12px; min-width:170px}
.cv-who{font-family:'Cinzel',serif; color:var(--c); font-weight:700; font-size:13px; letter-spacing:.06em; margin-bottom:6px; text-align:center}
.cv-art{display:grid; grid-template-columns:28px 1fr; gap:0 9px; align-items:center; padding:5px 0; border-top:1px dotted #4a4030}
.cv-art:first-of-type{border-top:none}
.cv-ic{grid-row:span 2; font-size:24px; text-align:center}
.cv-nm{font-family:'Cinzel',serif; color:var(--gold-soft); font-size:13px}
.cv-ds{color:#b3a888; font-size:11.5px}
.cv-foot{text-align:center; color:#8a7f66; font-size:11px; font-style:italic; margin-top:12px}

/* ── setup links ── */
.setup-links{display:flex; gap:.6rem; margin-top:.3rem; flex-wrap:wrap; justify-content:center}
.setup-links .pbtn{padding:8px 14px}

/* ── Guide modal ── */
.overlay{position:fixed; inset:0; background:#000a; backdrop-filter:blur(2px); z-index:50;
  display:flex; align-items:flex-start; justify-content:center; overflow-y:auto; padding:3vh 1rem}
.modal{position:relative; background:var(--stone); border:1px solid var(--gold); border-radius:8px;
  max-width:680px; width:100%; padding:1.6rem 1.6rem 2rem; box-shadow:0 30px 80px -20px #000}
.modal-x{position:sticky; float:right; top:0; background:var(--stone-2); color:var(--parch); border:1px solid var(--rule);
  border-radius:50%; width:30px; height:30px; font-size:14px}
.modal.guide h2{font-family:'Cinzel',serif; color:var(--gold); letter-spacing:.06em; font-size:26px; margin-bottom:.3rem}
.modal.guide h3{font-family:'Cinzel',serif; color:var(--gold-soft); letter-spacing:.04em; font-size:16px; margin:1.1rem 0 .35rem;
  border-top:1px solid #3a3226; padding-top:.7rem}
.modal.guide p,.modal.guide li{font-size:14.5px; line-height:1.6; color:#d6c9a8}
.modal.guide .g-lede{font-style:italic; color:#b5a888}
.modal.guide ul,.modal.guide ol{margin:.2rem 0 .2rem 1.2rem}
.modal.guide li{margin:.2rem 0}
.modal.guide b{color:var(--parch)}
.g-table{width:100%; border-collapse:collapse; margin:.4rem 0; font-size:13.5px}
.g-table th,.g-table td{border:1px solid #3a3226; padding:5px 8px; text-align:center}
.g-table th{font-family:'Cinzel',serif; color:var(--gold-soft); font-size:12px; letter-spacing:.04em; background:var(--stone-2)}
.g-table td:first-child,.g-table td:last-child{text-align:left}
.g-c{padding:0 6px; border-radius:3px; font-weight:700; font-size:12px}
.g-move{background:#3e7a3a55; color:#bfe6a0} .g-melee{background:#c0504a55; color:#f3c9c5}
.g-shoot{background:#d98f3a55; color:#f3dcb5} .g-charge{background:#9a6cc055; color:#e0cdf3}

/* ── Tutorial coach ── */
#coach{position:fixed; left:0; right:0; bottom:0; z-index:60; display:flex; justify-content:center;
  padding:0 1rem 1rem; pointer-events:none}
.coach-inner{pointer-events:auto; background:var(--stone-2); border:2px solid var(--gold); border-radius:10px;
  max-width:600px; width:100%; padding:.9rem 1.1rem; box-shadow:0 20px 50px -10px #000}
.coach-step{font-family:'Cinzel',serif; font-size:11px; letter-spacing:.16em; color:var(--gold-soft); text-transform:uppercase}
.coach-text{font-size:15px; line-height:1.55; color:var(--parch); margin:.35rem 0 .6rem}
.coach-text b{color:var(--gold-soft)}
.coach-btns{display:flex; align-items:center; gap:.5rem; flex-wrap:wrap}
.coach-hint{font-size:12px; color:#8a7f66; font-style:italic}
.coach-skip{margin-left:auto; opacity:.7; font-size:12px}
/* ── unit hover tooltip ── */
.utip{position:fixed; z-index:70; pointer-events:none; max-width:200px; background:#14100a;
  border:1px solid var(--gold); border-radius:5px; padding:7px 9px; box-shadow:0 8px 24px -6px #000;
  font-size:12px; line-height:1.45; color:#d6c9a8; display:flex; flex-direction:column; gap:2px}
.utip b{font-family:'Cinzel',serif; color:var(--gold-soft); font-size:13px; letter-spacing:.04em}
.utip .utg{color:#cdbf9d} .utip .utb{color:#9fd07a} .utip .uts{color:#d9a86a}
.utip .utstats{display:grid; grid-template-columns:1fr 1fr; gap:2px 8px; margin:3px 0}
.utip .utstat{color:#cdbf9d; font-size:11.5px}
.utip .utstat b{font-family:inherit; color:#fff; font-size:12.5px; letter-spacing:0}
.utip .utstat.atk{grid-column:1 / -1; color:#ffcf8a; border-bottom:1px dotted #ffffff22; padding-bottom:2px; margin-bottom:1px}
.utip .utstat.atk b{color:#ffd24a; font-size:13.5px}
.utip .utr{color:#ffd24a}

.coachmark{animation:pulse 1.1s ease-in-out infinite; position:relative; z-index:61}
.coach-board{box-shadow:0 0 0 3px var(--gold), 0 24px 50px -20px #000 !important}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px var(--gold)}50%{box-shadow:0 0 0 5px #c9a22788, 0 0 14px #c9a227}}
</style>
</head>
